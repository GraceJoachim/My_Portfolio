services:
  - type: web
    name: portfolio-backend
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://my-portfolio-w4qd.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://my-portfolio-w4qd.vercel.app
