services:
  - type: web
    name: portfolio-backend
    env: python
    # Request a Python runtime with prebuilt wheels for pydantic-core (3.11 is recommended)
    pythonVersion: 3.11
    plan: free
    # Upgrade pip first so it can find and install modern wheels, then install requirements
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://my-portfolio-w4qd.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://my-portfolio-w4qd.vercel.app
      # Provide writable locations for cargo/rustup so native builds can succeed if needed
      - key: CARGO_HOME
        value: /tmp/.cargo
      - key: RUSTUP_HOME
        value: /tmp/.rustup
